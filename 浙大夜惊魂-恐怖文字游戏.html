<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浙大夜惊魂 - 恐怖文字冒险</title>
<style>
:root{--bg:#0a0a0a;--panel-bg:#111112;--text:#c8c0b0;--text-dim:#6b6358;--accent:#8b1a1a;--accent-bright:#c0392b;--gold:#8a7a5a;--border:#1f1f1f;--choice-bg:#1a1a1c;--choice-hover:#252528;--danger:#7b1f1f;--stamina:#4a7a3a;--item-bg:#141416}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'SimSun','STSong','Microsoft YaHei','PingFang SC',serif;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow-x:hidden;cursor:default;user-select:none}
.bg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(20,15,10,0.4) 0%,rgba(0,0,0,0.95) 70%);pointer-events:none;z-index:0}
.bg-fog{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(60,40,30,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 30%,rgba(50,30,40,0.06) 0%,transparent 50%);animation:fogDrift 20s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes fogDrift{0%,100%{opacity:0.6;transform:translateX(0)}33%{opacity:0.8;transform:translateX(1%)}66%{opacity:0.5;transform:translateX(-1%)}}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.particle{position:absolute;background:rgba(180,160,140,0.3);border-radius:50%;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.6}90%{opacity:0.3}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}
.game-container{position:relative;z-index:2;width:100%;max-width:800px;margin:20px;min-height:85vh;display:flex;flex-direction:column}
.hidden{display:none!important}

.title-screen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 20px}
.title-main{font-size:3.2em;font-weight:700;color:var(--accent-bright);letter-spacing:0.15em;text-shadow:0 0 60px rgba(180,30,30,0.5),0 0 120px rgba(120,20,20,0.3);margin-bottom:10px;animation:titleGlow 3s ease-in-out infinite}
@keyframes titleGlow{0%,100%{text-shadow:0 0 60px rgba(180,30,30,0.5),0 0 120px rgba(120,20,20,0.3)}50%{text-shadow:0 0 90px rgba(200,40,40,0.7),0 0 180px rgba(160,30,30,0.5)}}
.title-sub{font-size:1.1em;color:var(--text-dim);letter-spacing:0.3em;margin-bottom:40px}
.title-warning{color:var(--accent-bright);font-size:0.85em;letter-spacing:0.15em;margin-bottom:50px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:0.5}50%{opacity:1}}
.btn-start{padding:16px 60px;font-size:1.2em;font-family:inherit;background:transparent;color:var(--text);border:1px solid var(--accent);letter-spacing:0.2em;cursor:pointer;transition:all 0.4s}
.btn-start:hover{background:var(--accent);color:#fff;box-shadow:0 0 40px rgba(180,30,30,0.4)}

.game-panel{flex:1;display:flex;flex-direction:column;background:var(--panel-bg);border:1px solid var(--border);border-radius:4px;padding:25px 30px;position:relative;box-shadow:0 0 60px rgba(0,0,0,0.5),inset 0 0 100px rgba(0,0,0,0.3)}
.game-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;margin-bottom:15px;border-bottom:1px solid var(--border);font-size:0.8em;color:var(--text-dim);letter-spacing:0.1em;flex-wrap:wrap;gap:8px}
.header-chapter{color:var(--accent-bright)}
.header-stats{display:flex;gap:16px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:4px}
.stat-icon{font-size:1.1em}
.stat-label{color:var(--text-dim);font-size:0.7em}
.stat-value{font-weight:bold}
.stat-value.sanity{color:#c08060}
.stat-value.stamina{color:#7aaa5a}
.stat-value.clues{color:var(--gold)}
.stat-value.trust{color:#7a9ab0}
.stat-bar-wrap{width:45px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:1px}
.stat-bar{height:100%;border-radius:2px;transition:width 0.5s}
.stat-bar.sanity{background:linear-gradient(90deg,#c0392b,#e08050)}
.stat-bar.stamina{background:linear-gradient(90deg,#3a6a2a,#6aaa4a)}

.inventory-toggle{position:fixed;bottom:20px;right:20px;z-index:50;width:44px;height:44px;background:var(--panel-bg);border:1px solid var(--border);border-radius:50%;cursor:pointer;font-size:1.4em;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.inventory-toggle:hover{border-color:var(--gold);box-shadow:0 0 15px rgba(138,122,90,0.3)}
.inventory-toggle.has-items{border-color:var(--gold);animation:glowPulse 2s infinite}
@keyframes glowPulse{0%,100%{box-shadow:0 0 5px rgba(138,122,90,0.2)}50%{box-shadow:0 0 20px rgba(138,122,90,0.5)}}
.inventory-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--accent-bright);border-radius:50%;font-size:0.6em;color:#fff;display:flex;align-items:center;justify-content:center}
.inventory-panel{position:fixed;bottom:75px;right:20px;z-index:50;width:240px;background:var(--panel-bg);border:1px solid var(--border);border-radius:6px;padding:15px;box-shadow:0 5px 30px rgba(0,0,0,0.7);transition:all 0.3s;transform-origin:bottom right}
.inventory-panel.hidden{display:none!important}
.inventory-title{color:var(--gold);font-size:0.8em;letter-spacing:0.15em;margin-bottom:10px;text-align:center}
.inventory-slot{width:100%;padding:8px 10px;margin:4px 0;background:var(--item-bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:0.8em;cursor:pointer;transition:all 0.2s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:8px}
.inventory-slot:hover{border-color:var(--gold);background:#1e1e22}
.inventory-slot .item-icon{font-size:1.3em;flex-shrink:0}
.inventory-slot .item-name{flex:1}
.inventory-slot .item-use{color:var(--text-dim);font-size:0.7em;display:none}
.inventory-slot:hover .item-use{display:inline}
.inventory-empty{color:var(--text-dim);font-size:0.75em;text-align:center;padding:15px 0}

.story-area{flex:1;overflow-y:auto;padding-right:10px;line-height:2;font-size:1.02em;scroll-behavior:smooth;max-height:50vh;min-height:250px}
.story-area::-webkit-scrollbar{width:4px}
.story-area::-webkit-scrollbar-track{background:transparent}
.story-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.story-text{margin-bottom:10px;animation:fadeIn 0.5s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.story-text.tense{color:#d4c8b8;font-style:italic;border-left:2px solid var(--accent);padding-left:15px;margin:16px 0}
.story-text.thought{color:#8a7e70;font-style:italic}
.story-text.shock{color:var(--accent-bright);font-weight:bold;font-size:1.08em;text-align:center;margin:18px 0;animation:shockPulse 1.5s ease-in-out infinite}
@keyframes shockPulse{0%,100%{opacity:0.7}50%{opacity:1}}
.story-text.item-get{color:#c8a860;text-align:center;border:1px solid var(--gold);padding:10px;margin:16px 0;animation:itemGlow 1s ease-out}
@keyframes itemGlow{from{border-color:var(--gold);box-shadow:0 0 20px rgba(200,168,96,0.5)}to{border-color:var(--border);box-shadow:none}}
.story-text.death{color:#ff2020;font-weight:bold;font-size:1.2em;text-align:center;margin:20px 0;animation:deathShake 0.2s ease-in-out infinite}
@keyframes deathShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.divider{text-align:center;color:var(--text-dim);margin:22px 0;letter-spacing:0.3em;font-size:0.8em}

.choices-area{padding-top:15px;border-top:1px solid var(--border);margin-top:12px;display:flex;flex-direction:column;gap:8px}
.choice-btn{display:block;width:100%;padding:12px 20px;font-size:0.92em;font-family:inherit;background:var(--choice-bg);color:var(--text);border:1px solid var(--border);text-align:left;cursor:pointer;transition:all 0.3s;letter-spacing:0.04em;position:relative}
.choice-btn:hover{background:var(--choice-hover);border-color:var(--accent);color:#e8dcd0;padding-left:28px}
.choice-btn:hover::before{content:'\25B6';position:absolute;left:10px;color:var(--accent-bright);font-size:0.65em;animation:arrowPulse 0.8s infinite}
@keyframes arrowPulse{0%,100%{opacity:0.5}50%{opacity:1}}
.choice-btn.danger{border-color:var(--danger);color:#c08080}
.choice-btn.danger:hover{background:rgba(139,26,26,0.2);border-color:var(--accent-bright);box-shadow:0 0 25px rgba(200,30,30,0.2)}
.choice-btn.critical{border-color:var(--accent-bright);background:rgba(139,26,26,0.1);animation:criticalPulse 2s infinite}
@keyframes criticalPulse{0%,100%{border-color:var(--accent-bright)}50%{border-color:#e74c3c;box-shadow:0 0 20px rgba(231,76,60,0.3)}}
.choice-btn.item-choice{border-color:var(--gold);color:#c8a860}
.choice-btn.item-choice:hover{background:rgba(138,122,90,0.15);border-color:#c8a860;box-shadow:0 0 15px rgba(138,122,90,0.2)}
.choice-btn.locked{opacity:0.4;cursor:not-allowed}
.choice-btn.locked:hover{background:var(--choice-bg);border-color:var(--border);padding-left:20px}
.choice-btn.locked:hover::before{display:none}

.jumpscare-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;pointer-events:none;opacity:0;transition:opacity 0.1s}
.jumpscare-overlay.active{opacity:1;animation:jsFlash 0.3s ease-out}
@keyframes jsFlash{0%{background:rgba(180,20,20,0.7);opacity:0}15%{background:rgba(200,0,0,0.9);opacity:1}40%{background:rgba(80,0,0,0.6);opacity:0.8}100%{background:rgba(0,0,0,0);opacity:0}}
.jumpscare-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:101;font-size:3em;color:#ff0000;font-weight:bold;text-shadow:0 0 40px red;pointer-events:none;opacity:0;transition:opacity 0.05s;letter-spacing:0.2em}
.jumpscare-text.active{opacity:1;animation:jsTextPop 0.6s ease-out forwards}
@keyframes jsTextPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.5)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}
.screen-shake{animation:screenShake 0.6s ease-out}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-6px) rotate(-0.5deg)}20%{transform:translateX(6px) rotate(0.5deg)}30%{transform:translateX(-6px)}40%{transform:translateX(6px)}50%{transform:translateX(-4px)}60%{transform:translateX(4px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}90%{transform:translateX(-1px)}}
.sanity-warning{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:99;color:#ff4444;font-size:0.85em;letter-spacing:0.2em;pointer-events:none;opacity:0;transition:opacity 0.5s}
.sanity-warning.show{opacity:1;animation:sanityWarnBlink 0.8s infinite}
@keyframes sanityWarnBlink{0%,100%{opacity:0.4}50%{opacity:1}}

.ending-screen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 20px}
.ending-title{font-size:2.2em;font-weight:700;letter-spacing:0.15em;margin-bottom:15px}
.ending-title.good{color:#c8a860;text-shadow:0 0 40px rgba(200,168,96,0.4)}
.ending-title.bad{color:var(--accent-bright);text-shadow:0 0 40px rgba(180,30,30,0.5)}
.ending-title.true{color:#a0c0d0;text-shadow:0 0 40px rgba(120,160,180,0.4)}
.ending-title.death{color:#ff0000;text-shadow:0 0 60px rgba(255,0,0,0.6);animation:deathGlow 0.5s infinite}
@keyframes deathGlow{0%,100%{text-shadow:0 0 60px rgba(255,0,0,0.6)}50%{text-shadow:0 0 100px rgba(255,0,0,1)}}
.ending-desc{color:var(--text-dim);max-width:500px;line-height:2;margin:20px 0 40px;font-size:1.02em}
.ending-stats{display:flex;gap:25px;margin-bottom:40px;font-size:0.82em;color:var(--text-dim);flex-wrap:wrap;justify-content:center}
.ending-stat-val{color:var(--gold);font-size:1.2em}
.btn-restart{padding:12px 40px;font-family:inherit;font-size:1em;background:transparent;color:var(--text);border:1px solid var(--border);cursor:pointer;letter-spacing:0.15em;transition:all 0.4s}
.btn-restart:hover{border-color:var(--accent);color:#fff}
.save-indicator{position:fixed;top:20px;right:20px;font-size:0.65em;color:var(--text-dim);letter-spacing:0.1em;z-index:10;opacity:0;transition:opacity 0.5s}
.save-indicator.show{opacity:1}
@media(max-width:600px){.game-panel{padding:15px}.title-main{font-size:2em}.story-area{max-height:40vh;font-size:0.92em}.header-stats{gap:6px}.inventory-panel{width:200px;right:10px;bottom:65px}}
</style>
</head>
<body>

<div class="bg-overlay"></div><div class="bg-fog"></div>
<div class="particles" id="particles"></div>
<div class="jumpscare-overlay" id="jsOverlay"></div>
<div class="jumpscare-text" id="jsText"></div>
<div class="sanity-warning" id="sanityWarn">⚠ 理智濒临崩溃</div>
<div class="save-indicator" id="saveIndicator">● 进度已保存</div>
<div class="inventory-toggle" id="invToggle" onclick="toggleInventory()" title="道具栏">🎒<span class="inventory-badge hidden" id="invBadge">0</span></div>
<div class="inventory-panel hidden" id="invPanel">
  <div class="inventory-title">道 具 栏</div><div id="invSlots"></div>
</div>

<div class="game-container" id="gameContainer">
  <div class="title-screen" id="titleScreen">
    <div class="title-main">浙大夜惊魂</div>
    <div class="title-sub">学长学姐代代相传的校园恐怖传说</div>
    <div class="title-warning">⚠ 游戏包含恐怖元素，请谨慎游玩 ⚠</div>
    <button class="btn-start" id="btnStart" onclick="startGame()">开 始 游 戏</button>
    <div style="margin-top:30px;color:var(--text-dim);font-size:0.7em">基于同名校园恐怖小说改编<br>多分支剧情 · 多结局 · 道具系统 · 理智管理</div>
  </div>
  <div class="game-panel hidden" id="gamePanel">
    <div class="game-header">
      <span class="header-chapter" id="chapterLabel">序章</span>
      <div class="header-stats">
        <div class="stat"><span class="stat-icon">🧠</span><span class="stat-label">理智</span><span class="stat-value sanity" id="sanityVal">100</span><div class="stat-bar-wrap"><div class="stat-bar sanity" id="sanityBar" style="width:100%"></div></div></div>
        <div class="stat"><span class="stat-icon">💪</span><span class="stat-label">体力</span><span class="stat-value stamina" id="staminaVal">100</span><div class="stat-bar-wrap"><div class="stat-bar stamina" id="staminaBar" style="width:100%"></div></div></div>
        <div class="stat"><span class="stat-icon">🔍</span><span class="stat-label">线索</span><span class="stat-value clues" id="clueVal">0</span></div>
        <div class="stat"><span class="stat-icon">❤️</span><span class="stat-label">信任</span><span class="stat-value trust" id="trustVal">50</span></div>
      </div>
    </div>
    <div class="story-area" id="storyArea"></div>
    <div class="choices-area" id="choicesArea"></div>
  </div>
</div>

<script>
// ==================== ENGINE ====================
var $ = function(id) { return document.getElementById(id); };

var ITEMS = {
  talisman:{name:'护身符',icon:'🔖',desc:'一枚黄色的符纸。能在关键时刻抵御一次理智伤害。'},
  flashlight:{name:'手电筒',icon:'🔦',desc:'小型强光手电。在黑暗区域提供照明，减少恐惧。'},
  diary:{name:'日记残页',icon:'📜',desc:'一张泛黄的纸，记录着关于医学院的零碎信息。'},
  medicine:{name:'镇定药',icon:'💊',desc:'白色小药瓶。服用后恢复20点理智。'},
  energy:{name:'能量饮料',icon:'🥤',desc:'罐装咖啡。饮用后恢复30点体力。'},
  cat_hair:{name:'黑猫毛发',icon:'🐾',desc:'一小撮黑色的猫毛。黑猫能感知超自然存在。'},
  key_card:{name:'门禁卡',icon:'🪪',desc:'一张旧门禁卡，能打开医学院地下仓库的门。'},
  photograph:{name:'老照片',icon:'📷',desc:'泛黄的照片，上面有一个穿古装的女人站在教学楼前。'}
};

var gameState = {
  currentScene:'intro', sanity:100, stamina:100, clues:0, trust:50,
  inventory:[], visitedScenes:{}, chapterNum:0, keyFlags:{}
};
var sanityDead = false;

function updateStats() {
  $('sanityVal').textContent = gameState.sanity;
  $('staminaVal').textContent = gameState.stamina;
  $('clueVal').textContent = gameState.clues;
  $('trustVal').textContent = gameState.trust;
  $('sanityBar').style.width = gameState.sanity + '%';
  $('staminaBar').style.width = gameState.stamina + '%';
  if (gameState.sanity <= 25) { $('sanityVal').style.color = '#ff4444'; $('sanityWarn').classList.add('show'); }
  else { $('sanityVal').style.color = '#c08060'; $('sanityWarn').classList.remove('show'); }
  if (gameState.stamina <= 25) $('staminaVal').style.color = '#ffaa44'; else $('staminaVal').style.color = '#7aaa5a';
}

function modStat(stat, amount) {
  if (stat === 'sanity' && amount < -5 && hasItem('talisman')) {
    removeItem('talisman');
    addStory('🔖 护身符突然发烫，化作一道金光，挡下了那股侵蚀你理智的力量！', 'item-get');
    amount = Math.min(0, amount + 15);
  }
  gameState[stat] = Math.max(0, Math.min(100, gameState[stat] + amount));
  if (stat === 'stamina' && gameState.stamina <= 0) gameState.stamina = 0;
  updateStats();
  if (stat === 'sanity' && gameState.sanity <= 0 && !sanityDead) {
    sanityDead = true; setTimeout(function(){ triggerSanityDeath(); }, 300);
  }
}

function setChapter(name) {
  gameState.chapterNum++;
  var t = ['','一','二','三','四','五','六','七','八','九'];
  $('chapterLabel').textContent = '第' + (t[gameState.chapterNum]||gameState.chapterNum) + '章 · ' + name;
}

// ==================== ITEMS ====================
function hasItem(id) { return gameState.inventory.indexOf(id) !== -1; }
function addItem(id) {
  if (hasItem(id)) return false;
  gameState.inventory.push(id); updateInventoryUI(); return true;
}
function removeItem(id) {
  var i = gameState.inventory.indexOf(id);
  if (i !== -1) { gameState.inventory.splice(i, 1); updateInventoryUI(); return true; }
  return false;
}
function updateInventoryUI() {
  var slots = $('invSlots'), badge = $('invBadge'), toggle = $('invToggle');
  var count = gameState.inventory.length;
  if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); toggle.classList.add('has-items'); }
  else { badge.classList.add('hidden'); toggle.classList.remove('has-items'); }
  slots.innerHTML = '';
  if (count === 0) { slots.innerHTML = '<div class="inventory-empty">空空如也</div>'; return; }
  gameState.inventory.forEach(function(id) {
    var item = ITEMS[id]; if (!item) return;
    var slot = document.createElement('div');
    slot.className = 'inventory-slot'; slot.title = item.desc;
    slot.innerHTML = '<span class="item-icon">'+item.icon+'</span><span class="item-name">'+item.name+'</span><span class="item-use">查看</span>';
    slot.onclick = function(e) { e.stopPropagation(); alert(item.icon+' '+item.name+'\n\n'+item.desc); };
    slots.appendChild(slot);
  });
}
function toggleInventory() { $('invPanel').classList.toggle('hidden'); }

function randomDrop(sceneId) {
  var drops = {
    'back_to_dorm':['talisman'], 'read_forum_post':['diary'],
    'enter_back':['cat_hair','flashlight'], 'find_du':['medicine'],
    'stand_ground':['photograph'], 'run_from_ghost':['energy'],
    'fight_together':['key_card']
  };
  var possible = (drops[sceneId]||[]).filter(function(id){ return !hasItem(id); });
  if (possible.length === 0) return;
  if (Math.random() < 0.5) {
    var dropId = possible[Math.floor(Math.random()*possible.length)];
    addItem(dropId);
    addStory('✨ 你发现了「'+ITEMS[dropId].name+'」！'+ITEMS[dropId].desc, 'item-get');
  }
}

// ==================== JUMP SCARES ====================
function triggerJumpScare(text, intensity) {
  intensity = intensity || 'medium';
  var overlay = $('jsOverlay'), jsText = $('jsText'), panel = $('gamePanel');
  if (text) { jsText.textContent = text; jsText.classList.add('active'); setTimeout(function(){ jsText.classList.remove('active'); }, 600); }
  overlay.classList.add('active'); setTimeout(function(){ overlay.classList.remove('active'); }, 300);
  if (intensity === 'high') { panel.classList.add('screen-shake'); setTimeout(function(){ panel.classList.remove('screen-shake'); }, 600); var a=$('storyArea'); a.style.filter='brightness(2)'; setTimeout(function(){ a.style.filter=''; }, 200); }
  // REDUCED: high -8, medium -4, low -2
  modStat('sanity', intensity==='high'?-8:intensity==='medium'?-4:-2);
}
function triggerSanityDeath() {
  clearStory(); triggerJumpScare('疯 狂', 'high');
  setTimeout(function(){

function shakeScreen() { var p=$('gamePanel'); p.classList.add('screen-shake'); setTimeout(function(){ p.classList.remove('screen-shake'); }, 600); }
function flashScreen() { var a=$('storyArea'); a.style.filter='brightness(1.8)'; setTimeout(function(){ a.style.filter=''; }, 150); }

// ==================== RENDERING ====================
function clearStory() { $('storyArea').innerHTML = ''; }
function addStory(text, className) {
  var area = $('storyArea'), p = document.createElement('p');
  p.className = 'story-text' + (className ? ' ' + className : '');
  p.textContent = text; area.appendChild(p);
  area.scrollTop = area.scrollHeight; return p;
}
function addDivider(text) {
  var area = $('storyArea'), d = document.createElement('div');
  d.className = 'divider'; d.textContent = text || '· · ·';
  area.appendChild(d); area.scrollTop = area.scrollHeight;
}

function setChoices(choices) {
  var area = $('choicesArea'); area.innerHTML = '';
  if (hasItem('medicine') && gameState.sanity < 80) {
    choices.push({text:'💊 服用镇定药（恢复20理智）', next:'__use_medicine', style:'item-choice', sanity:0, stamina:0});
  }
  if (hasItem('energy') && gameState.stamina < 80) {
    choices.push({text:'🥤 饮用能量饮料（恢复30体力）', next:'__use_energy', style:'item-choice', sanity:0, stamina:0});
  }
  choices.forEach(function(ch) {
    var classes = ['choice-btn'];
    if (ch.style) classes.push(ch.style);
    if (ch.reqStamina && gameState.stamina < ch.reqStamina) classes.push('locked');
    if (ch.reqItem && !hasItem(ch.reqItem)) classes.push('locked');
    var btn = document.createElement('button');
    btn.className = classes.join(' ');
    var label = ch.text;
    if (ch.reqStamina && gameState.stamina < ch.reqStamina) label += ' [体力不足]';
    if (ch.reqItem && !hasItem(ch.reqItem)) label += ' [需要'+(ITEMS[ch.reqItem]?ITEMS[ch.reqItem].name:ch.reqItem)+']';
    btn.textContent = label;
    btn.onclick = function() {
      if (ch.reqStamina && gameState.stamina < ch.reqStamina) return;
      if (ch.reqItem && !hasItem(ch.reqItem)) return;
      if (ch.sanity) modStat('sanity', ch.sanity);
      if (ch.stamina) modStat('stamina', ch.stamina);
      if (ch.clues) modStat('clues', ch.clues);
      if (ch.trust) modStat('trust', ch.trust);
      if (ch.flag) gameState.keyFlags[ch.flag] = true;
      if (ch.effect === 'shake') shakeScreen();
      if (ch.effect === 'flash') flashScreen();
      if (ch.effect === 'jumpscare') triggerJumpScare(ch.jsText||'', ch.jsIntensity||'medium');
      if (sanityDead) return;
      if (ch.next === '__use_medicine') { removeItem('medicine'); modStat('sanity',20); addStory('你吞下两片镇定药。一股清凉的感觉从喉咙蔓延到全身，混乱的思绪稍微清晰了一些。','thought'); renderScene(gameState.currentScene); return; }
      if (ch.next === '__use_energy') { removeItem('energy'); modStat('stamina',30); addStory('你一口气喝光了罐装咖啡。疲惫的身体重新燃起力量。','thought'); renderScene(gameState.currentScene); return; }
      if (ch.next) { gameState.currentScene = ch.next; autoSave(); renderScene(ch.next); }
    };
    area.appendChild(btn);
  });
}

// ==================== SCENE ENTRY ====================
function sceneEntry(sceneId) {
  if (gameState.visitedScenes[sceneId]) {
    var visits = gameState.visitedScenes[sceneId];
    if (visits === 1) addStory('【你之前已经经历过这段情节。时间线继续推进……】', 'thought');
    else addStory('【这段记忆似曾相识，仿佛在一个遥远的梦里经历过。】', 'thought');
    gameState.visitedScenes[sceneId]++;
    return visits + 1;
  }
  gameState.visitedScenes[sceneId] = 1;
  return 0;
}

// ==================== ENDING DISPLAY ====================
function showEnding(type, title, description) {
  var area = $('storyArea'); $('choicesArea').innerHTML = ''; autoSave();
  var endingDiv = document.createElement('div'); endingDiv.className = 'ending-screen';
  var titleEl = document.createElement('div'); titleEl.className = 'ending-title ' + type;
  titleEl.textContent = title; endingDiv.appendChild(titleEl);
  var descEl = document.createElement('div'); descEl.className = 'ending-desc';
  descEl.textContent = description; endingDiv.appendChild(descEl);
  var statsDiv = document.createElement('div'); statsDiv.className = 'ending-stats';
  statsDiv.innerHTML = '剩余理智 <span class="ending-stat-val">'+gameState.sanity+'</span> | 体力 <span class="ending-stat-val">'+gameState.stamina+'</span> | 线索 <span class="ending-stat-val">'+gameState.clues+'</span> | 信任 <span class="ending-stat-val">'+gameState.trust+'</span>';
  endingDiv.appendChild(statsDiv);
  var endingsFound = [];
  try { endingsFound = JSON.parse(localStorage.getItem('zheda_endings')||'[]'); } catch(e) {}
  if (endingsFound.indexOf(title)===-1) { endingsFound.push(title); localStorage.setItem('zheda_endings',JSON.stringify(endingsFound)); }
  if (endingsFound.length>0) {
    var endDiv = document.createElement('div'); endDiv.style.cssText = 'color:var(--text-dim);font-size:0.7em;margin-bottom:20px;letter-spacing:0.1em;';
    endDiv.textContent = '已解锁结局: '+endingsFound.join(' / '); endingDiv.appendChild(endDiv);
  }
  var restartBtn = document.createElement('button'); restartBtn.className = 'btn-restart';
  restartBtn.textContent = '重 新 开 始'; restartBtn.onclick = function(){ resetGame(); startGame(); };
  endingDiv.appendChild(restartBtn);
  area.appendChild(endingDiv); area.scrollTop = area.scrollHeight;
  $('chapterLabel').textContent = '结局';
};

// ==================== GAME FLOW ====================
function renderScene(sceneId) {
  try {
    if (sanityDead) return;
    if (scenes[sceneId]) { scenes[sceneId](); }
    else {
      var endId = 'ending_escape';
      if (gameState.sanity <= 20 && gameState.clues >= 15) endId = 'ending_nightmare';
      else if (gameState.trust >= 70 && gameState.sanity >= 30) endId = 'ending_good';
      if (scenes[endId]) scenes[endId](); else scenes['ending_escape']();
    }
    updateStats();
    if (gameState.stamina <= 20 && gameState.stamina > 0) addStory('⚠ 你感到极度疲惫，脚步越来越沉重。', 'tense');
  } catch(e) {
    console.error('Scene error:', e);
    clearStory(); addStory('游戏出现了错误，请重新开始。', 'shock');
    setChoices([{text:'重新开始', next:'intro', sanity:0, stamina:0}]);
    resetGameState();
  }
}

function startGame() {
  try { localStorage.removeItem('zheda_horror_save'); } catch(e) {}
  $('titleScreen').classList.add('hidden');
  $('gamePanel').classList.remove('hidden');
  $('invToggle').classList.remove('hidden');
  resetGameState();
  updateStats(); updateInventoryUI();
  renderScene('intro');
}

function resetGameState() {
  gameState.sanity = 100; gameState.stamina = 100; gameState.clues = 0; gameState.trust = 50;
  gameState.inventory = []; gameState.visitedScenes = {}; gameState.chapterNum = 0;
  gameState.keyFlags = {}; gameState.currentScene = 'intro'; sanityDead = false;
}

function resetGame() {
  $('gamePanel').classList.add('hidden'); $('titleScreen').classList.remove('hidden');
  $('invToggle').classList.add('hidden'); $('invPanel').classList.add('hidden');
  $('storyArea').innerHTML = ''; $('choicesArea').innerHTML = '';
  $('sanityWarn').classList.remove('show');
  resetGameState(); updateStats(); updateInventoryUI();
}

function autoSave() {
  try {
    localStorage.setItem('zheda_horror_save', JSON.stringify(gameState));
    var i = $('saveIndicator'); i.classList.add('show');
    setTimeout(function(){ i.classList.remove('show'); }, 2000);
  } catch(e) {}
}

// ==================== INIT ====================
(function init() {
  var pContainer = $('particles');
  for (var i = 0; i < 25; i++) {
    var p = document.createElement('div'); p.className = 'particle';
    var size = Math.random()*3+1;
    p.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*15+10)+'s;animation-delay:'+(Math.random()*15)+'s;';
    pContainer.appendChild(p);
  }
  try {
    var saved = localStorage.getItem('zheda_horror_save');
    if (saved) {
      var data = JSON.parse(saved);
      if (data.currentScene && data.currentScene!=='intro' && data.chapterNum>0 && scenes[data.currentScene]) {
        var startBtn = document.getElementById('btnStart');
        if (startBtn && startBtn.parentNode) {
          var continueBtn = document.createElement('button');
          continueBtn.className = 'btn-start';
          continueBtn.style.cssText = 'margin-top:12px;border-color:var(--gold);color:var(--gold);';
          continueBtn.textContent = '继 续 游 戏';
          continueBtn.onclick = function() {
            Object.assign(gameState, data);
            gameState.visitedScenes = gameState.visitedScenes || {};
            gameState.inventory = gameState.inventory || [];
            gameState.keyFlags = gameState.keyFlags || {};
            $('titleScreen').classList.add('hidden');
            $('gamePanel').classList.remove('hidden');
            $('invToggle').classList.remove('hidden');
            updateStats(); updateInventoryUI();
            renderScene(gameState.currentScene);
          };
          startBtn.parentNode.insertBefore(continueBtn, startBtn.nextSibling);
        }
      }
    }
  } catch(e) { localStorage.removeItem('zheda_horror_save'); }
})();

document.addEventListener('keydown', function(e) {
  if (e.key==='i' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleInventory(); }
  if (e.key==='r' && e.ctrlKey && !e.shiftKey) { e.preventDefault(); if (confirm('确定要重新开始吗？')) { resetGame(); startGame(); } }
});
